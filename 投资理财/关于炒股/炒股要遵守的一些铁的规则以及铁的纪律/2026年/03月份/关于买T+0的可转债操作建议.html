        关于买 T+0 的可转债操作建议

        可转债尽量不能开盘买，因为大部分开盘买都是大坑，只能再盘中买，因为可转债的风险跟波动都很大,开盘就买存在太大的不确定性了。

        当买跌幅较大的可转债时，要看当前可转债属于什么位置，不能跟像买ETF那样，稍微跌点就去补仓可转债，

        因为可转债是T0的，风险是相对比较大的。当可转债的跌幅较大时，往往存在流动性风险，不能随随便便去补仓的

        已经吃了好几次这种亏了，跌没跌多少就去补仓而引起的大亏，这种情况已经很多次了，

        当然，也包括买T0的港股标的也是，也是这种情况。
