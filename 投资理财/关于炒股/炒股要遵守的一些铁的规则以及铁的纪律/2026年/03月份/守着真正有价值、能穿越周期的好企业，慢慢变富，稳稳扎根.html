            下跌不买低估合理好公司，上涨就只能望股兴叹，

            我们处于中国最好最伟大时代，史无前例长牛市一定要把握住，这是属于我们85后，40岁左右这一代人最大的红利。

            我们这代人爸妈大多在家务农，如今上有老下有小，肩上扛着整个家的重量。

            吃过苦，懂珍惜，不赌运气，只信国运和自己的眼光。

            不追热点，不炒概念，守着真正有价值、能穿越周期的好企业，慢慢变富，稳稳扎根。

            这不是别人的牛市，是我们靠踏实、熬出来的时代红利。

            抓住这一波，给父母安稳晚年，给孩子更好起点，也给自己半生奔波一个交代。
