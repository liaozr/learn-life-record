        股票被套后千万别盲目补仓，越补越套只会放大风险，很多人因此亏损惨重。

        我从不补仓，单只个股仓位严格控制在计划内，多余资金宁可开新仓也不追加被套标的。

        坚持分散投资，不恋战、切记不重仓单只个股，才能守住系统性风险 ​​​


        
        如果只重仓一两只股票，一旦走势不及预期被套，就会陷入极度被动的局面

        不仅资金动弹不得，只能漫长死等，心态也会备受煎熬。

        而分散布局、均衡配置，就能做到东边不亮西边亮，一部分个股调整，另一部分可能在盈利，账户整体更平稳，
        
        持股心态也会舒服很多。 ​​​
