        投资切忌重仓甚至满仓押注单一股票或单个板块。没有人能百分百确定某只个股、某个板块只涨不跌，
        
        所有判断都只是概率层面的预判。因此必须坚持分散布局，不把鸡蛋放在同一个篮子里。
        
        我们要清醒认知自身能力边界，切勿高估自己判断、低估市场的风险。 ​​​
