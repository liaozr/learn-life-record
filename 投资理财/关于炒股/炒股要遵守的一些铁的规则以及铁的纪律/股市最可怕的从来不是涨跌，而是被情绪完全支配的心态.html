            股市最可怕的从来不是涨跌，而是被情绪完全支配的心态。
            
            上涨时贪婪躁动，生怕踏空而盲目追高；
            
            下跌时恐惧慌乱，担心深套而急于割肉。
            
            没有原则、不懂等待，在高点接盘、低位止损，
            
            反复被市场收割，这种心态是亏损的根源。 ​​​
